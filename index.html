<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ИИ-Инженер — Пробный урок</title>
<!--
  ВКЛАДКА 1 — ПЕСОЧНИЦА для курса по ИИ.
  Студент: выбирает нишу → видит на карте реальные бизнесы ЦЕНТРА Москвы без сайта →
  открывает карточку с разбором → жмёт «Собрать промпт для Lovable» → копирует →
  идёт во вкладку 2 (Lovable) и собирает сайт.

  КАРТА: OpenStreetMap через Leaflet (тёмные тайлы CARTO). Ключ и регистрация НЕ нужны —
  карта с пинами работает из коробки. Координаты бизнесов зашиты в данные (геокод адресов).
  Нужен только интернет (Leaflet и тайлы грузятся с CDN).
-->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Onest:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#F6F4EE; --panel:#FFFFFF; --panel2:#F4F2EB; --line:rgba(40,36,28,0.09);
    --text:#23211C; --ink-soft:#5C574B; --muted:#928C7C; --accent:#2F6BFF; --accent2:#1E50CC;
    --claude:#2F6BFF; --warn:#C07A1E; --danger:#C0392B; --chip:#F0EDE4;
    --mono:'JetBrains Mono',ui-monospace,monospace; --disp:'Onest','Manrope',sans-serif;
    --radius:18px; --shadow:0 14px 40px rgba(40,36,28,.10);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{font-family:'Manrope',-apple-system,"Segoe UI",Roboto,Arial,sans-serif;background:var(--bg);color:var(--text);overflow:hidden}
  header{display:flex;align-items:center;gap:14px;padding:12px 18px;border-bottom:1px solid var(--line);background:#FFFFFF}
  header .logo{font-family:var(--disp);font-weight:700;font-size:20px;letter-spacing:-0.01em;line-height:1.05;display:flex;flex-direction:column}
  header .logo .logo-sub{font-family:var(--mono);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--claude);margin-top:3px}
  header .logo b{color:var(--accent)}
  header .step{font-family:var(--mono);font-size:12px;color:var(--muted);background:var(--chip);padding:5px 10px;border-radius:20px;border:1px solid var(--line)}
  header .spacer{flex:1}
  header .cta{text-decoration:none;color:#fff;background:var(--accent);font-weight:700;padding:9px 16px;border-radius:10px;font-size:14px}
  header .cta:hover{background:var(--accent2)}
  .layout{display:grid;grid-template-columns:250px 480px 1fr;gap:14px;padding:14px;height:calc(100% - 59px)}
  .sidebar{display:flex;flex-direction:column;min-height:0;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  .search{padding:14px 14px 8px}
  .search label{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted)}
  .search input,.search select{width:100%;margin-top:6px;padding:11px 12px;background:var(--panel2);border:1px solid var(--line);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;outline:none}
  .search input:focus,.search select:focus{border-color:var(--accent)}
  .counter{padding:6px 16px 10px;font-family:var(--mono);font-size:12px;color:var(--muted)}
  .counter b{color:var(--accent)}
  .list{flex:1;overflow-y:auto;padding:0 10px 14px}
  .item{padding:12px 13px;border:1px solid var(--line);border-radius:12px;margin:8px 4px;cursor:pointer;background:var(--panel2);transition:.15s}
  .item:hover{border-color:var(--accent);transform:translateY(-1px);box-shadow:0 4px 14px rgba(15,27,46,.06)}
  .item.active{border-color:var(--accent);background:#E7EFFF}
  .item .name{font-family:var(--disp);font-weight:600;font-size:14px;display:flex;justify-content:space-between;gap:8px}
  .item .meta{font-size:12px;color:var(--muted);margin-top:3px}
  .badge{font-family:var(--mono);font-size:10px;padding:2px 7px;border-radius:20px;white-space:nowrap;align-self:center;font-weight:600}
  .b-none{background:#FDE7E7;color:#C0232C;border:1px solid #F2C2C5}
  .b-soc{background:#E3ECFF;color:#1E50CC;border:1px solid #C2D5FF}
  .b-tap{background:#FBF1D9;color:#9A6B12;border:1px solid #EBD7A6}
  .b-stub{background:#EEE6FB;color:#6A39B5;border:1px solid #DAC9F3}
  .mapwrap{position:relative;min-height:0;isolation:isolate;border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  #map{width:100%;height:100%;background:#ECEAE3}
  .leaflet-popup-content-wrapper,.leaflet-popup-tip{background:var(--panel);color:var(--text);border:1px solid var(--line)}
  .leaflet-popup-content{font-size:13px;line-height:1.5}
  .leaflet-popup-content a{color:var(--accent);font-weight:600}
  .leaflet-container a.leaflet-popup-close-button{color:var(--muted)}
  .leaflet-bar a{background:var(--panel);color:var(--text);border-color:var(--line)}
  .map-legend{position:absolute;left:12px;bottom:12px;z-index:500;background:rgba(255,255,255,.95);border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-family:var(--mono);font-size:11px;color:var(--ink-soft);box-shadow:0 6px 18px rgba(15,27,46,.10)}
  .map-legend i{display:inline-block;width:9px;height:9px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .mapfallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:10px;text-align:center;padding:40px;color:var(--muted);background:repeating-linear-gradient(45deg,#EEF3FB,#EEF3FB 12px,#F6F9FD 12px,#F6F9FD 24px)}
  .mapfallback h3{color:var(--text);margin:0}
  .card{position:fixed;top:73px;right:14px;width:470px;max-width:92vw;height:calc(100% - 87px);background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);transform:translateX(calc(100% + 26px));transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;z-index:1100;overflow:hidden}
  .card.open{transform:translateX(0)}
  .card .top{padding:18px 20px;border-bottom:1px solid var(--line);position:relative}
  .card .close{position:absolute;top:14px;right:16px;cursor:pointer;color:var(--muted);font-size:22px;border:none;background:none}
  .card h2{margin:0 36px 4px 0;font-family:var(--disp);font-weight:700;font-size:22px;letter-spacing:-0.01em;line-height:1.1}
  .card .sub{color:var(--muted);font-size:13px}
  .card .body{flex:1;overflow-y:auto;padding:18px 20px}
  .scanline{height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);animation:scan 1s linear;margin-bottom:14px}
  @keyframes scan{from{opacity:0;transform:scaleX(.2)}50%{opacity:1}to{opacity:0;transform:scaleX(1)}}
  .row{display:flex;gap:8px;font-size:13px;margin:7px 0}
  .row .k{color:var(--muted);min-width:78px}
  .row a{color:var(--accent);text-decoration:none}
  .sec{margin-top:18px}
  .sec h4{margin:0 0 7px;font-family:var(--mono);font-size:12px;text-transform:uppercase;letter-spacing:.1em;color:var(--claude)}
  .sec p{margin:0;font-size:13.5px;line-height:1.55;color:var(--ink-soft)}
  .actions{padding:14px 20px;border-top:1px solid var(--line);display:flex;gap:10px;flex-wrap:wrap}
  .btn{flex:1;min-width:150px;border:none;border-radius:11px;padding:13px;font-weight:700;font-size:14px;font-family:inherit;cursor:pointer}
  .btn-main{background:var(--accent);color:#fff}
  .btn-main:hover{background:var(--accent2)}
  .btn-sec{background:var(--panel2);color:var(--text);border:1px solid var(--line)}
  .btn-sec:hover{border-color:var(--accent)}
  .modal{position:fixed;inset:0;background:rgba(15,27,46,0.55);display:none;align-items:center;justify-content:center;z-index:1200;padding:20px}
  .modal.open{display:flex}
  .modal .box{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);width:760px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;box-shadow:var(--shadow)}
  .modal .mhead{padding:16px 20px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px}
  .modal .mhead h3{margin:0;font-size:16px;flex:1}
  .modal .mtabs{display:flex;gap:6px;padding:10px 20px 0}
  .mtab{padding:7px 14px;border-radius:9px 9px 0 0;background:var(--panel2);border:1px solid var(--line);border-bottom:none;cursor:pointer;font-size:13px;color:var(--muted)}
  .mtab.active{background:var(--bg);color:var(--text);font-weight:600}
  .modal textarea{flex:1;margin:0 20px;min-height:300px;background:var(--bg);color:var(--text);border:1px solid var(--line);border-radius:0 10px 10px 10px;padding:14px;font-family:var(--mono);font-size:12.5px;line-height:1.5;resize:none}
  .modal .mfoot{padding:14px 20px;display:flex;gap:10px;align-items:center}
  .modal .hint{flex:1;font-size:12px;color:var(--muted)}
  .copybtn{background:var(--accent);color:#fff;border:none;border-radius:10px;padding:11px 20px;font-weight:700;font-family:inherit;cursor:pointer}
  .copybtn.done{background:#2E9E5B}
  .steps{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px 18px;overflow-y:auto;min-height:0}
  .steps__h{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--claude);margin-bottom:16px}
  .vstep{display:flex;gap:11px;cursor:pointer}
  .vstep__col{display:flex;flex-direction:column;align-items:center}
  .vstep__n{width:26px;height:26px;border-radius:50%;background:var(--chip);border:1px solid var(--line);color:var(--muted);font-family:var(--mono);font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;transition:.3s}
  .vstep__line{width:2px;flex:1;min-height:16px;background:var(--line);margin:2px 0;transition:.3s}
  .vstep:last-child .vstep__line{display:none}
  .vstep__t{font-family:var(--disp);font-weight:500;font-size:13.5px;color:var(--muted);padding:3px 0 16px;line-height:1.3;transition:.3s}
  .vstep:last-child .vstep__t{padding-bottom:0}
  .vstep.done .vstep__n{background:var(--accent);border-color:var(--accent);color:#fff}
  .vstep.done .vstep__line{background:var(--accent)}
  .vstep.done .vstep__t{color:var(--text)}
  .vstep.active .vstep__n{background:var(--accent);border-color:var(--accent);color:#fff;box-shadow:0 0 0 4px rgba(47,107,255,.18)}
  .vstep.active .vstep__t{color:var(--text);font-weight:700}
  .vstep:hover .vstep__t{color:var(--text)}
  .funnel{margin-top:22px;border-top:1px dashed var(--line);padding-top:16px}
  .funnel__lead{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--claude);margin-bottom:12px}
  .funnel__pin{display:flex;align-items:center;gap:8px;background:#E7EFFF;border:1px solid #C9DAFF;border-radius:12px;padding:11px 14px;font-size:14px;color:var(--text);font-weight:700}
  .funnel__pin .pinico{font-size:15px}
  .fconn{height:14px;margin-left:24px;border-left:2px solid var(--line)}
  .fstep__card{border:1px solid var(--line);border-radius:12px;background:var(--panel2);overflow:hidden;transition:border-color .15s}
  .fstep.open .fstep__card{border-color:var(--accent);box-shadow:0 6px 18px rgba(47,107,255,.10)}
  .fstep__head{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
  .fstep__n{flex:0 0 24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;font-family:var(--mono);font-weight:600;font-size:12px;display:flex;align-items:center;justify-content:center}
  .fstep__t{flex:1;font-family:var(--disp);font-weight:600;font-size:13.5px;line-height:1.2}
  .fstep__chev{color:var(--muted);transition:transform .2s;font-size:12px}
  .fstep.open .fstep__chev{transform:rotate(180deg)}
  .fstep__body{display:none;padding:0 14px 14px}
  .fstep.open .fstep__body{display:block}
  .fstep__desc{font-size:12.5px;color:var(--muted);margin:0 0 8px;line-height:1.4}
  .fcode{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:10px 11px;font-family:var(--mono);font-size:11.5px;line-height:1.45;color:var(--text);max-height:148px;overflow:auto;white-space:pre-wrap;margin-bottom:10px}
  .fcopy{width:100%;background:var(--accent);color:#fff;border:none;border-radius:9px;padding:11px;font-weight:700;font-family:inherit;font-size:13.5px;cursor:pointer}
  .fcopy:hover{background:var(--accent2)}
  .fcopy.done{background:#2E9E5B}
  @media (max-width:880px){
    html,body{height:auto;overflow:auto}
    header{position:sticky;top:0;z-index:30}
    .layout{display:block;height:auto;padding:12px}
    .steps{overflow:visible;margin-bottom:12px}
    .mapwrap{height:340px;margin-bottom:12px}
    .sidebar{overflow:visible;margin-bottom:12px}
    .list{overflow:visible}
    .card{width:auto;left:0;right:0;top:0;height:100%;border-radius:0;border:none}
  }
  ::-webkit-scrollbar{width:9px} ::-webkit-scrollbar-thumb{background:#D8D3C7;border-radius:6px}
</style>
</head>

 FSTEPS.forEach((st,i)=>{
   h+='<div class="fconn"></div>';
   h+=`<div class="fstep ${i===0?'open':''}" data-k="${st.key}" style="margin:0 ${i*12}px">
        <div class="fstep__card">
          <div class="fstep__head" onclick="toggleStep('${st.key}')"><span class="fstep__n">${st.n}</span><span class="fstep__t">${st.title}</span><span class="fstep__chev">▾</span></div>
          <div class="fstep__body"><p class="fstep__desc">${st.desc}</p><div class="fcode">${esc(promptByKey(b,st.key))}</div><button class="fcopy" onclick="copyPrompt('${st.key}',this)">Скопировать промпт</button></div>
        </div>
      </div>`;
 });
 return h+'</div>';
}
function toggleStep(key){ const el=document.querySelector('.fstep[data-k="'+key+'"]'); if(el) el.classList.toggle('open'); }
function copyPrompt(key,btn){
 if(current===null) return;
 const txt=promptByKey(DATA[current],key);
 navigator.clipboard.writeText(txt).then(()=>{btn.textContent='✓ Скопировано';btn.classList.add('done');}).catch(()=>{document.execCommand&&document.execCommand('copy');});
 setStep(key==='site'?3:5);
}

/* ====================== UI ====================== */
let current=null, currentTab='site', mapReady=false, myMap=null, markerLayer=null, markers=[];
const $=s=>document.querySelector(s);
const nicheSel=$("#niche"), areaSel=$("#area"), listEl=$("#list");

function areaOf(t){
 if(/Маросейка|Китай-город|Лучников/.test(t)) return "Китай-город / Маросейка";
 if(/Пятницк|Замоскворечье|Полянка|Якиманка/.test(t)) return "Замоскворечье";
 if(/Мясницк|Чистые|Уланск|Лубянка/.test(t)) return "Чистые пруды / Мясницкая";
 if(/Сретенк/.test(t)) return "Сретенка";
 if(/Патриаршие/.test(t)) return "Патриаршие пруды";
 if(/Хамовники|Кропоткин/.test(t)) return "Хамовники";
 if(/Цветной|Трубная/.test(t)) return "Цветной бульвар";
 if(/Покровка/.test(t)) return "Покровка";
 if(/Таганка/.test(t)) return "Таганка";
 if(/Басманный|Курск|Лялин/.test(t)) return "Курская / Басманный";
 if(/Арбат|Филипповск/.test(t)) return "Арбат";
 if(/Охотный|Революции/.test(t)) return "Охотный Ряд";
 return "Центр";
}
DATA.forEach(d=>{ d.area=areaOf(d.district); });
const niches=["Все ниши",...[...new Set(DATA.map(d=>d.niche))]];
nicheSel.innerHTML=niches.map(n=>`<option>${n}</option>`).join("");
const areas=["Все районы",...[...new Set(DATA.map(d=>d.area))].sort()];
areaSel.innerHTML=areas.map(a=>`<option>${a}</option>`).join("");

function filtered(){
 const n=nicheSel.value, a=areaSel.value;
 return DATA.filter(d=>(n==="Все ниши"||d.niche===n) && (a==="Все районы"||d.area===a));
}
function render(){
 const arr=filtered();
 $("#count").textContent=arr.length;
 listEl.innerHTML=arr.map(d=>{
   const i=DATA.indexOf(d), s=STATUS[d.st];
   return `<div class="item ${current===i?'active':''}" onclick="openCard(${i})">
     <div class="name">${d.name}<span class="badge ${s[0]}">${s[1]}</span></div>
     <div class="meta">${d.niche} · ${d.district}</div>
   </div>`;
 }).join("") || `<div style="padding:20px;color:var(--muted);font-size:13px">Ничего не найдено. Сбрось фильтр.</div>`;
 if(mapReady) drawMarkers(arr);
}
nicheSel.onchange=render; areaSel.onchange=render;

/* ---- прогресс по этапам (левая колонка) ---- */
const STEPS=["Выбери офлайн-бизнес на карте или в списке","Собери разбор этого бизнеса","Скопируй промпт из карточки и перенеси в Qwen","Qwen сгенерирует сайт с автоответчиком по этому промпту","Внеси желаемые правки","Прикрепи сайт на платформу"];
let currentStep=1;
const stepsEl=$("#steps");
function renderSteps(){
 let html='<div class="steps__h">Этапы</div>';
 STEPS.forEach((s,idx)=>{
   const n=idx+1, cls=n<currentStep?'done':n===currentStep?'active':'';
   html+=`<div class="vstep ${cls}" onclick="goStep(${n})">
     <div class="vstep__col"><div class="vstep__n">${n<currentStep?'✓':n}</div><div class="vstep__line"></div></div>
     <div class="vstep__t">${s}</div>
   </div>`;
 });
 stepsEl.innerHTML=html;
}
function setStep(n){ if(n>currentStep){ currentStep=n; renderSteps(); } }   // авто-прогресс (только вперёд)
function goStep(n){ currentStep=n; renderSteps(); }                          // ручной клик по этапу
renderSteps();

function openCard(i){
 current=i; const b=DATA[i]; const s=STATUS[b.st];
 $("#c-name").textContent=b.name;
 $("#c-sub").textContent=`${b.niche} · ${b.district}`;
 $("#c-body").innerHTML=`
   <div class="scanline"></div>
   <div class="row"><span class="k">Статус</span><span><span class="badge ${s[0]}">${s[1]}</span></span></div>
   <div class="row"><span class="k">Средний чек</span><span>${b.check}</span></div>
   <div class="row"><span class="k">Адрес</span><span>${b.address}</span></div>
   <div class="row"><span class="k">Телефон</span><span>${b.phone}</span></div>
   <div class="row"><span class="k">Соцсети</span><span>${b.socials}</span></div>
   <div class="row"><span class="k">Источник</span><a href="${b.url}" target="_blank">карточка на Яндекс.Картах ↗</a></div>
   <div class="sec"><h4>Что за бизнес</h4><p>${b.desc}</p></div>
   <div class="sec"><h4>Офферы для сайта</h4><p>${b.offers}</p></div>
   <div class="sec"><h4>Боли клиента</h4><p>${b.pains}</p></div>
   <div class="sec"><h4>Чего не хватает без сайта</h4><p>${b.missing}</p></div>
   ${buildFunnel(b)}
 `;
 $("#card").classList.add("open");
 setStep(2);
 render();
 if(mapReady && markers[i]){ myMap.setView(DATA[i].coords,15,{animate:true}); markers[i].openPopup(); }
}
function closeCard(){current=null;$("#card").classList.remove("open");render();}

document.addEventListener("keydown",e=>{if(e.key==="Escape"){closeCard();}});

/* ====================== КАРТА (Leaflet + OpenStreetMap/CARTO, без ключа) ====================== */
function markerColor(st){ return st==='none'?'#E5484D':st==='soc'?'#2F6BFF':st==='tap'?'#D08A1E':'#7A4FD0'; }
function drawMarkers(arr){
 if(!markerLayer) return;
 markerLayer.clearLayers(); markers=[];
 arr.forEach(d=>{
   const i=DATA.indexOf(d), s=STATUS[d.st];
   const m=L.circleMarker(d.coords,{radius:9,weight:2,color:'#fff',fillColor:markerColor(d.st),fillOpacity:.95});
   m.bindTooltip(d.name,{direction:'top'});
   m.bindPopup(`<b>${d.name}</b><br>${d.niche}<br>${d.address}<br><span style="color:#8b97a7">${s[1]}</span><br><a href="#" onclick="openCard(${i});return false;">открыть карточку →</a>`);
   m.on('click',()=>openCard(i));
   markers[i]=m; markerLayer.addLayer(m);
 });
}
function initMap(){
 myMap=L.map('map',{zoomControl:true,attributionControl:true}).setView([55.757,37.624],12);
 myMap.attributionControl.setPrefix(false); // убираем подпись Leaflet с флагом
 L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png',{
   attribution:'© OpenStreetMap, © CARTO', subdomains:'abcd', maxZoom:19
 }).addTo(myMap);
 markerLayer=L.layerGroup().addTo(myMap);
 mapReady=true; $("#mapfallback").style.display="none";
 render();
 setTimeout(()=>myMap.invalidateSize(),200);
 window.addEventListener('resize',()=>myMap.invalidateSize());
}
function loadMap(){ if(typeof L==='undefined'){ render(); return; } initMap(); }

render();
loadMap();
</script>
</body>
</html>
